[tools]
python = "3.13"
uv = "latest"

[settings]
python.uv_venv_auto = "create|source"

[tasks.update-php-versions]
description = "Update PHP versions in Dockerfiles from Docker Hub"
run = "uv run python scripts/update_php_versions.py"

[tasks.update-dockerfile]
description = "Update Dockerfile contents from official WordPress Dockerfile"
run = "uv run python scripts/update_dockerfile.py"
